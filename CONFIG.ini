; Configuration Files


; Basic Config
[BASIC]
IP = 192.168.100.21
MAIN_DIR = main
FORMAT_CODE = utf-8
HTTP_ENABLE = yes
MSG_VANILA_PRINT = yes
MSG_NO_IMPORTANT = no
MSG_JSON = yes
AUTO_SAVE_SERVER = yes


[DIRS]
SOCKET_DIR = _sockets
OUTPUT_DIR = OUTPUT
EXTRAS_DIR = EXTRAS


[ADVANCED]
HTTP_ADMIN_ENABLE = yes
RAW_LEN = 2048
UNIX_RAW_LEN = 2048
UNIX_SOCKET_FORMAT = utf-8
ACCEPT_CONN_TIMEOUT = 3
PROC_CYCLE_PAUSE = 2
PAUSE_OVERFLOW = 0.2

[HEADERS]
MSG_SYS_HEADERS = "##@@"

[DEV]
MSG_DEV = yes
LOAD_ALL_SERVERS = yes
